.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.phead{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.ptitle{font-size:14px;font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:980px){.grid2{grid-template-columns:1fr}}
.tblwrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:#fff;max-height:72vh;overflow-y:auto}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px}
th{position:sticky;top:0;z-index:1;background:#f8f9fb;padding:10px 12px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;text-align:left}
td{padding:8px 12px;border-bottom:1px solid var(--line);white-space:nowrap;color:#363c49}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f6f9ff}
tr.hl td{background:var(--amber-soft)}
tr.hl:hover td{background:#fef3c7}
.num{font-variant-numeric:tabular-nums}
.filters{display:flex;gap:9px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
select{padding:8px 12px;border-radius:9px;border:1px solid var(--border);font-size:12.5px;background:#fff;color:var(--text);font-family:inherit;outline:none;cursor:pointer}
select:focus{border-color:var(--blue)}
.sumbar{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}
.chip{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:9px;font-size:12px;font-weight:500;background:#fff;border:1px solid var(--border);color:var(--text2)}
.chip b{color:var(--text);font-variant-numeric:tabular-nums;font-weight:700}
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-weight:700;font-size:11px}
.pred{background:var(--red-soft);color:var(--red)}
.pamber{background:var(--amber-soft);color:var(--amber)}
.pgreen{background:var(--green-soft);color:var(--green)}
.pgray{background:#f1f3f6;color:var(--text3)}
.legend{display:flex;gap:13px;font-size:11.5px;color:var(--text2);align-items:center;flex-wrap:wrap}
.dot{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:-1px}
.vrow{margin-bottom:13px}
.vrow:last-child{margin-bottom:2px}
.vmeta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;gap:10px}
.vname{font-size:12.5px;font-weight:600}
.vval{font-size:12px;color:var(--text2);white-space:nowrap}
.vval b{font-variant-numeric:tabular-nums;color:var(--text);font-weight:700}
.vval em{font-style:normal;color:var(--text3);margin-left:7px;font-size:11px;font-variant-numeric:tabular-nums}
.vbar{display:flex;height:14px;border-radius:5px;overflow:hidden;background:#f0f2f5}
.mbar{display:flex;height:14px;border-radius:4px;overflow:hidden;background:#f0f2f5}

.srcnote{margin-top:11px;font-size:11px;color:var(--text3)}
.fxdelta{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums}
.foot{margin-top:26px;text-align:center;font-size:11.5px;color:var(--text3)}

function Card({icon,label,value,sub,tone}){

function Panel({title,right,children,style}){

}

function Table({cols,data,hl}){

}

// ==== Charts ====
function FxChart({tall}){
  const rates = fxData.map(d=>d.rate);
  const mn = Math.min(...rates)-12, mx = Math.max(...rates)+12, rng = mx-mn;
  const w=720, h=tall?250:228, pL=50, pR=88, pT=16, pB=26;
  const cW=w-pL-pR, cH=h-pT-pB;
  const pts = fxData.map((d,i)=>({x:pL+(i/(fxData.length-1))*cW, y:pT+cH-((d.rate-mn)/rng)*cH, ...d}));
  const lineD = pts.map((p,i)=>(i===0?'M':'L')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');
  const areaD = lineD+' L'+pts[pts.length-1].x.toFixed(1)+' '+(pT+cH)+' L'+pts[0].x.toFixed(1)+' '+(pT+cH)+' Z';
  const last = pts[pts.length-1];
  const delta = rates[rates.length-1]-rates[rates.length-2];
  const lastIdx = pts.length-1;
  return <Panel title="관세청 주간 고시환율 추이 (USD/KRW)"
    right={<span className="fxdelta" style={{color:delta>0?'var(--red)':delta<0?'var(--green)':'var(--text3)'}}>{(delta>0?'+':'')+delta.toFixed(2)} 전주 대비</span>}>
    <svg viewBox={'0 0 '+w+' '+h} style={{width:'100%'}}>
      <defs>
        <linearGradient id="fxg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#2563eb" stopOpacity="0.16"/>
          <stop offset="100%" stopColor="#2563eb" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[0,0.25,0.5,0.75,1].map(p=>{
        const y=pT+cH*(1-p), val=Math.round(mn+rng*p);
        return <g key={p}>
          <line x1={pL} y1={y} x2={w-pR} y2={y} stroke="#eceef2" strokeWidth="1" strokeDasharray={p===0?'0':'3 4'}/>
          <text x={pL-8} y={y+3.5} textAnchor="end" fontSize="9.5" fill="#9aa3b2">{val.toLocaleString()}</text>
        </g>;
      })}
      <path d={areaD} fill="url(#fxg)"/>
      <path d={lineD} fill="none" stroke="#2563eb" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
      {pts.filter((_,i)=>i===lastIdx||(i%4===0&&lastIdx-i>=3)).map((p,i)=>
        <text key={i} x={p.x} y={h-5} textAnchor="middle" fontSize="9" fill="#9aa3b2">{p.start.slice(5)}</text>)}
      <circle cx={last.x} cy={last.y} r="7" fill="#2563eb" opacity="0.15"/>
      <circle cx={last.x} cy={last.y} r="3.5" fill="#fff" stroke="#2563eb" strokeWidth="2"/>
      <text x={last.x+11} y={last.y+4} fontSize="11.5" fontWeight="700" fill="#1d4ed8">{last.rate.toLocaleString('ko-KR',{minimumFractionDigits:2})}</text>
    </svg>
  </Panel>;
}

}

function VendorChart(){
  const vm = {};
  [...poData.filter(d=>d.month&&d.month.startsWith('2026')),...licData.filter(d=>d.month&&d.month.startsWith('2026'))].forEach(d=>{
    if(!vm[d.vendor]) vm[d.vendor]={eq:0,lc:0};
    if(d.type&&(d.type.includes('워런티')||d.type.includes('라이센스')||d.type==='Inspection')) vm[d.vendor].lc+=d.total; else vm[d.vendor].eq+=d.total;
  });
  const vs = Object.entries(vm).sort((a,b)=>(b[1].eq+b[1].lc)-(a[1].eq+a[1].lc));
  const mx = Math.max(...vs.map(([,v])=>v.eq+v.lc));
  const grand = vs.reduce((s,[,v])=>s+v.eq+v.lc,0);
  return <Panel title="업체별 수입원가 현황" right={<ChartLegend/>}>
    {vs.map(([name,val])=>{
      const t = val.eq+val.lc;
      return <div key={name} className="vrow">
        <div className="vmeta">
          <span className="vname">{name}</span>
          <span className="vval"><b>{fmt(t)}원</b><em>{grand?(t/grand*100).toFixed(1):0}%</em></span>
        </div>
        <div className="vbar">
          {val.eq>0 && <div style={{width:(val.eq/mx*100)+'%',background:'var(--blue)'}}/>}
          {val.lc>0 && <div style={{width:(val.lc/mx*100)+'%',background:'var(--violet)'}}/>}
        </div>
      </div>;
    })}
  </Panel>;
}

function MonthlyTable(){
  const m = {};
  poData.forEach(d=>{if(!m[d.month])m[d.month]={eq:0,lc:0};m[d.month].eq+=d.total;});
  licData.forEach(d=>{if(!m[d.month])m[d.month]={eq:0,lc:0};m[d.month].lc+=d.total;});
  const sorted = Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
  const mx = Math.max(...sorted.map(([,v])=>v.eq+v.lc));
  const gEq = sorted.reduce((s,[,v])=>s+v.eq,0);
  const gLc = sorted.reduce((s,[,v])=>s+v.lc,0);
  return <Panel title="월별 수입원가 현황" right={<ChartLegend/>} style={{marginTop:13}}>
    <table>
      <thead><tr>
        <th style={{width:80}}>귀속월</th><th></th>
        <th style={{textAlign:'right',width:130}}>장비/부품</th>
        <th style={{textAlign:'right',width:130}}>라이센스</th>
        <th style={{textAlign:'right',width:140}}>합계</th>
      </tr></thead>
      <tbody>
        {sorted.map(([mo,v])=>
          <tr key={mo||'none'}>
            <td style={{fontWeight:600,color:mo?'var(--text)':'var(--text3)'}}>{mo||'미귀속'}</td>
            <td style={{minWidth:160}}>
              <div className="mbar">
                {v.eq>0 && <div style={{width:(v.eq/mx*100)+'%',background:'var(--blue)'}}/>}
                {v.lc>0 && <div style={{width:(v.lc/mx*100)+'%',background:'var(--violet)'}}/>}
              </div>
            </td>
            <td className="num" style={{textAlign:'right'}}>{v.eq?fmt(v.eq):'-'}</td>
            <td className="num" style={{textAlign:'right'}}>{v.lc?fmt(v.lc):'-'}</td>
            <td className="num" style={{textAlign:'right',fontWeight:700,color:'var(--text)'}}>{fmt(v.eq+v.lc)}원</td>
          </tr>)}
        <tr style={{background:'#f8f9fb'}}>
          <td style={{fontWeight:800,borderTop:'1px solid var(--border)'}}>합계</td>
          <td style={{borderTop:'1px solid var(--border)'}}></td>
          <td className="num" style={{textAlign:'right',fontWeight:800,borderTop:'1px solid var(--border)'}}>{fmt(gEq)}</td>
          <td className="num" style={{textAlign:'right',fontWeight:800,borderTop:'1px solid var(--border)'}}>{fmt(gLc)}</td>
          <td className="num" style={{textAlign:'right',fontWeight:800,borderTop:'1px solid var(--border)'}}>{fmt(gEq+gLc)}원</td>
        </tr>
      </tbody>
    </table>
  </Panel>;
}

        <div className="logo">RNR</div>
        <div>
          <h1>2026년 수입원가 산출표</h1>
          <div className="subtitle">기준일 2026-07-02 | 회계처리용 통합 데이터</div>
        </div>
      </div>
      <div className="linkbtns">
        <a className="lbtn" href="https://docs.google.com/spreadsheets/d/1Nxh8QbxTghlqNC-Rsk6WkUpFCE1ETMoPbUHPze0SitE/edit?gid=956759540#gid=956759540" target="_blank" rel="noopener noreferrer"><Ic d={PATHS.sheet} color="var(--green)"/>원본 시트</a>
        <a className="lbtn" href="https://github.com/rnrfin/rnr-importcost/raw/main/latest.xlsx"><Ic d={PATHS.download} color="var(--blue)"/>Excel 다운로드</a>
      </div>
    </div>

    <div className="tabs">
      {TABS.map(t=><button key={t.id} className={'tab'+(tab===t.id?' active':'')} onClick={()=>setTab(t.id)}>{t.l}</button>)}
    </div>

    {tab==='overview' && <React.Fragment>
      <div className="cards">
        <Card icon="cube" tone="blue" label="장비/부품 총 수입원가" value={fmt(eqTotal)+'원'} sub={fmtU(poData.reduce((s,d)=>s+d.usd,0))}/>
        <Card icon="shield" tone="violet" label="라이센스/워런티 합계" value={fmt(lcTotal)+'원'} sub={fmtU(licData.reduce((s,d)=>s+d.usd,0))}/>
        <Card icon="wallet" tone="green" label="총 합계" value={fmt(grand)+'원'} sub={fmtU(poData.reduce((s,d)=>s+d.usd,0)+licData.reduce((s,d)=>s+d.usd,0))}/>
        <Card icon="clock" tone="red" label="미상환 L/C" value={fmtU(lcData.reduce((s,d)=>s+d.usd,0))} sub={lcData.map(d=>fmtD(dday(d.due))).join(' / ')}/>
        <Card icon="trend" tone="amber" label="최신 고시환율" value={'₩'+Number(lastFx.rate).toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2})} sub={lastFx.start+' ~ '+lastFx.end}/>
      </div>
      <div className="grid2"><VendorChart/><FxChart/></div>
      <MonthlyTable/>
    </React.Fragment>}

    {tab==='po' && <React.Fragment>
      <div className="filters">
        <select value={vf} onChange={e=>setVf(e.target.value)}>{vendors.map(v=><option key={v}>{v}</option>)}</select>
        <select value={tf} onChange={e=>setTf(e.target.value)}>{types.map(v=><option key={v}>{v}</option>)}</select>
        <select value={mf} onChange={e=>setMf(e.target.value)}>{months.map(v=><option key={v}>{v||'미귀속'}</option>)}</select>
        <span className="chip"><b>{filtered.length}</b>건</span>
      </div>
      <Table
        cols={[
          {k:'no',l:'No.',a:'center'},{k:'po',l:'PO No.'},{k:'vendor',l:'업체'},{k:'type',l:'구분'},{k:'item',l:'품명'},
          {l:'Invoice(USD)',a:'right',r:r=>fmtU(r.usd)},
          {l:'적용환율',a:'right',r:r=>r.rate?Number(r.rate).toLocaleString('ko-KR',{minimumFractionDigits:1,maximumFractionDigits:1}):'-'},
          {l:'관세',a:'right',r:r=>fmt(r.tariff)},{l:'부가세',a:'right',r:r=>fmt(r.vat)},
          {l:'운송료',a:'right',r:r=>fmt(r.shipFee)},
          {l:'총 수입원가',a:'right',r:r=><b className="num">{fmt(r.total)}</b>},
          {k:'qty',l:'수량',a:'center'},{l:'개당 원가',a:'right',r:r=>fmt(r.unit)},{k:'month',l:'귀속월'}
        ]}
        data={filtered} hl={r=>r.total===0}/>
      <div className="sumbar">
        <span className="chip">Invoice 합계 <b>{fmtU(filtered.reduce((s,d)=>s+d.usd,0))}</b></span>
        <span className="chip">총 수입원가 <b>{fmt(filtered.reduce((s,d)=>s+d.total,0))}원</b></span>
      </div>
    </React.Fragment>}

    {tab==='lic' && <React.Fragment>
      <Table
        cols={[
          {k:'no',l:'No.',a:'center'},{k:'po',l:'PO No.'},{k:'vendor',l:'업체'},{k:'type',l:'구분'},{k:'item',l:'품명'},
          {l:'Invoice(USD)',a:'right',r:r=>fmtU(r.usd)},{k:'remit',l:'송금일'},
          {l:'수입원가(KRW)',a:'right',r:r=><b className="num">{fmt(r.total)}</b>},
          {k:'start',l:'계약시작'},{k:'end',l:'계약종료'}
        ]}
        data={licData} hl={r=>r.total===0}/>
      <div className="sumbar">
        <span className="chip">Invoice 합계 <b>{fmtU(licData.reduce((s,d)=>s+d.usd,0))}</b></span>
        <span className="chip">수입원가 합계 <b>{fmt(licData.reduce((s,d)=>s+d.total,0))}원</b></span>
      </div>
    </React.Fragment>}

    {tab==='remit' && <React.Fragment>
      <Table
        cols={[
          {k:'no',l:'No.',a:'center'},{k:'date',l:'송금일'},{k:'recipient',l:'수취인'},{k:'poRef',l:'PO 참조'},
          {l:'USD 금액',a:'right',r:r=>fmtU(r.usd)},
          {l:'적용환율',a:'right',r:r=>r.rate?Number(r.rate).toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2}):'-'},
          {l:'중계수수료(USD)',a:'right',r:r=>r.midFeeUsd?fmtU(r.midFeeUsd):'-'},
          {l:'수수료(KRW)',a:'right',r:r=>fmt(r.feeKrw)},
          {l:'전신료(KRW)',a:'right',r:r=>fmt(r.cableKrw)},
          {l:'KRW 출금총액',a:'right',r:r=><b className="num">{fmt(r.krwActual)}</b>}
        ]}
        data={remitData} hl={r=>!r.krwActual}/>
      <div className="sumbar">
        <span className="chip">송금 <b>{remitData.length}건</b></span>
        <span className="chip">USD 합계 <b>{fmtU(remitData.reduce((s,d)=>s+d.usd,0))}</b></span>
        <span className="chip">KRW 합계 <b>{fmt(remitData.reduce((s,d)=>s+d.krwActual,0))}원</b></span>
      </div>
    </React.Fragment>}

    {tab==='lc' && <React.Fragment>
      <div className="cards" style={{gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))'}}>
        <Card icon="clock" tone="red" label="미상환 L/C 합계" value={fmtU(lcData.reduce((s,d)=>s+d.usd,0))} sub="기준일: 2026-07-02"/>
        <Card icon="wallet" tone="blue" label="총 L/C 한도" value={fmtU(lcBankData.reduce((s,d)=>s+d.limit,0))} sub="신한, 하나, 우리 합산"/>
        <Card icon="shield" tone="green" label="잔여 가용 한도" value={fmtU(lcBankData.reduce((s,d)=>s+d.avail,0))} sub="활성 은행 기준"/>
        <Card icon="trend" tone="amber" label="가장 빠른 상환" value={minLc?fmtD(dday(minLc.due)):'-'} sub={minLc?minLc.po+' ('+minLc.due+')':'미상환 없음'}/>
      </div>
      <div className="sechead">은행별 Usance L/C 한도 현황</div>
      <Table
        cols={[
          {k:'bank',l:'은행'},
          {l:'총 한도(USD)',a:'right',r:r=>fmtU(r.limit)},
          {l:'현재 오픈(USD)',a:'right',r:r=>fmtU(r.open)},
          {l:'잔여 가용(USD)',a:'right',r:r=>fmtU(r.avail)},
          {l:'상태',a:'center',r:r=><span className={'pill '+(r.active==='활성'?'pgreen':'pgray')}>{r.active}</span>},
          {k:'note',l:'비고'}
        ]}
        data={lcBankData}/>
      <div className="sechead">미상환 L/C 현황</div>
      <Table
        cols={[
          {k:'no',l:'No.',a:'center'},{k:'po',l:'PO No.'},{k:'vendor',l:'업체'},
          {l:'개설금액(USD)',a:'right',r:r=>fmtU(r.usd)},{k:'bank',l:'개설은행'},{k:'lc',l:'L/C No.'},
          {k:'open',l:'개설일'},{k:'exp',l:'만기일'},{k:'days',l:'기간'},{k:'accept',l:'인수일'},{k:'due',l:'상환예정일'},
          {l:'D-Day',a:'center',r:r=>{
            const d = dday(r.due);
            return <span className={'pill '+(d<=30?'pred':d<=60?'pamber':'pgreen')}>{fmtD(d)}</span>;
          }}
        ]}
        data={lcData}/>
      <div className="sechead">수입/통관 정보</div>
      <Table
        cols={[
          {k:'po',l:'PO No.'},{k:'decNo',l:'수입신고번호'},{k:'decDate',l:'수리일자'},
          {l:'신고환율(₩)',a:'right',r:r=>r.decRate?r.decRate.toLocaleString():'-'},
          {l:'관세(KRW)',a:'right',r:r=>fmt(r.tariff)},{l:'부가세(KRW)',a:'right',r:r=>fmt(r.vat)},
          {k:'broker',l:'관세사'},{l:'관세사비',a:'right',r:r=>fmt(r.brokerFee)},
          {k:'shipper',l:'운송사'},{l:'운송료',a:'right',r:r=>fmt(r.shipFee)},
          {l:'해외수수료(USD)',a:'right',r:r=>fmtU(r.overseaFee)}
        ]}
        data={lcCustomsData}/>
      <div className="srcnote">출처: 총 한도는 Slack 2024-11-19, 활성 여부는 Slack 2026-03-16 도원석</div>
    </React.Fragment>}

    {tab==='fx' && <React.Fragment>
      <FxChart tall={true}/>
      <div style={{marginTop:13}}>
        <Table
          cols={[
            {k:'start',l:'적용 시작일'},{k:'end',l:'적용 종료일'},
            {l:'수입환율 (₩/USD)',a:'right',r:r=><b className="num">{Number(r.rate).toLocaleString('ko-KR',{minimumFractionDigits:2,maximumFractionDigits:2})}</b>},
            {l:'변동',a:'right',r:r=>{
              const idx = fxData.indexOf(r);
              if(idx===0) return '-';
              const d = r.rate-fxData[idx-1].rate;
              return <span className="num" style={{color:d>0?'var(--red)':d<0?'var(--green)':'var(--text2)',fontWeight:600}}>{(d>0?'+':'')+d.toFixed(2)}</span>;
            }}
          ]}
          data={[...fxData].reverse()}/>
      </div>
    </React.Fragment>}

    <div className="foot">RNR 수입원가 산출표 | 기준일 2026-07-02 | <span className="dot" style={{background:'#fde68a'}}></span>노란색 하이라이트는 미확인 항목</div>
  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
