function Overview() {

  const W=400, H=80;
  const pts = rates.map((r,i) => {
    const x=(i/(rates.length-1||1))*W, y=H-((r-minR)/(maxR-minR||1))*H;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  return (
    <div>
      <div className="cards">
        <div className="card"><div className="card-label">장비/부품 합계</div><div className="card-value">₩{fmt(EQ_TOTAL)}</div><div className="card-sub">{poData.length}건</div></div>
        <div className="card purple"><div className="card-label">라이센스/워런티</div><div className="card-value">₩{fmt(LIC_TOTAL)}</div><div className="card-sub">{licData.length}건</div></div>
        <div className="card green"><div className="card-label">총 수입원가</div><div className="card-value">₩{fmt(GRAND_TOTAL)}</div><div className="card-sub">전체 합계</div></div>
        <div className="card red"><div className="card-label">미상환 L/C</div><div className="card-value">{fmtUSD(LC_UNPAID_USD)}</div><div className="card-sub">{lcData.filter(d=>!['상환완료','완료','paid'].includes((d.status||'').trim())).length}건</div></div>
        <div className="card orange"><div className="card-label">최신 고시환율</div><div className="card-value">₩{LATEST_RATE.toLocaleString()}</div><div className="card-sub">{fxData.length>0?fxData[fxData.length-1].start:''}</div></div>

        <div className="chart-wrap">
          <div className="chart-title">업체별 수입원가</div>

                <span style={{fontSize:11,color:'#1e293b',fontWeight:700}}>₩{fmt(total)}</span>
              </div>
              <div style={{background:'#f1f5f9',borderRadius:4,height:8}}>
                <div style={{width:`${(total/maxV*100).toFixed(1)}%`,height:'100%',background:'#3b82f6',borderRadius:4}}></div>
              </div>
            </div>
          ))}
        </div>
        <div className="chart-wrap">
          <div className="chart-title">환율 추이 (최근 12주)</div>
          <svg width="100%" viewBox={`0 0 ${W} ${H+20}`} style={{overflow:'visible'}}>
            <polyline points={pts} fill="none" stroke="#3b82f6" strokeWidth="2"/>
            {fxRecent.map((f,i) => {
              const x=(i/(fxRecent.length-1||1))*W, y=H-((f.rate-minR)/(maxR-minR||1))*H;
              return <circle key={i} cx={x} cy={y} r="3" fill="#3b82f6"/>;
            })}
            <text x="0" y={H+16} fontSize="9" fill="#94a3b8">{fxRecent[0]?.start}</text>
            <text x={W} y={H+16} fontSize="9" fill="#94a3b8" textAnchor="end">{fxRecent[fxRecent.length-1]?.start}</text>
          </svg>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#64748b',marginTop:4}}>
            <span>최저: ₩{Math.min(...rates).toLocaleString()}</span>
            <span>최고: ₩{Math.max(...rates).toLocaleString()}</span>
          </div>
        </div>
      </div>
      <div className="chart-wrap">
        <div className="chart-title">귀속월별 수입원가 (장비/부품)</div>

  );
}

function LCTable() {
  const today = new Date();
  return (
    <div className="table-wrap">
      <table>
        <thead><tr>
          <th>No</th><th>PO No</th><th>업체</th><th>품명</th>
          <th>USD</th><th>개설일</th><th>만기일</th><th>D-Day</th><th>상태</th>
        </tr></thead>
        <tbody>
          {lcData.map((d,i)=>{
            const due = d.dueDate ? new Date(d.dueDate) : null;
            const dday = due ? Math.ceil((due-today)/(1000*60*60*24)) : null;
            const isOverdue = dday!==null&&dday<0;
            const isUrgent = dday!==null&&dday>=0&&dday<=30;
            return (
              <tr key={i} style={{background:isOverdue?'#fee2e2':isUrgent?'#fef9c3':''}}>
                <td className="ctr">{d.no}</td>
                <td style={{fontWeight:600}}>{d.po}</td>
                <td className="ctr">{d.vendor}</td>
                <td>{d.item}</td>
                <td className="num">{fmtUSD(d.usd)}</td>
                <td className="ctr">{d.openDate}</td>
                <td className="ctr">{d.dueDate}</td>
                <td className="ctr" style={{fontWeight:700,color:isOverdue?'#dc2626':isUrgent?'#92400e':'#475569'}}>
                  {dday!==null?(isOverdue?`D+${Math.abs(dday)}`:`D-${dday}`):''}
                </td>
                <td className="ctr"><span className={`badge ${d.status==='상환완료'?'badge-green':isOverdue?'badge-red':isUrgent?'badge-orange':'badge-blue'}`}>{d.status}</span></td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function FXTable() {
  const recent = fxData.slice(-20);
  const rates = recent.map(f=>f.rate);
  const minR=Math.min(...rates)*0.998, maxR=Math.max(...rates)*1.002;
  const W=600, H=100;
  const pts = rates.map((r,i)=>{
    const x=(i/(rates.length-1||1))*W, y=H-((r-minR)/(maxR-minR||1))*H;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return (
    <div>
      <div className="chart-wrap" style={{marginBottom:16}}>
        <div className="chart-title">주간 환율 추이</div>
        <svg width="100%" viewBox={`0 0 ${W} ${H+24}`}>
          <polyline points={pts} fill="none" stroke="#3b82f6" strokeWidth="2.5"/>
          {recent.map((f,i)=>{
            const x=(i/(recent.length-1||1))*W, y=H-((f.rate-minR)/(maxR-minR||1))*H;
            return <circle key={i} cx={x} cy={y} r="3.5" fill="#3b82f6"/>;
          })}
          <text x="0" y={H+18} fontSize="10" fill="#94a3b8">{recent[0]?.start}</text>
          <text x={W} y={H+18} fontSize="10" fill="#94a3b8" textAnchor="end">{recent[recent.length-1]?.start}</text>
        </svg>
      </div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>적용시작일</th><th>적용종료일</th><th>통화</th><th>수입환율 (KRW)</th><th>전주 대비</th></tr></thead>
          <tbody>
            {[...fxData].reverse().map((d,i,arr)=>{
              const prev=arr[i+1];
              const diff=prev?d.rate-prev.rate:0;
              const isUp=diff>0, isDown=diff<0;
              return (
                <tr key={i}>
                  <td className="ctr">{d.start}</td>
                  <td className="ctr">{d.end}</td>
                  <td className="ctr">{d.currency}</td>
                  <td className="num" style={{fontWeight:700,fontSize:13}}>{d.rate.toLocaleString('ko-KR',{minimumFractionDigits:2})}</td>
                  <td className="ctr" style={{color:isUp?'#dc2626':isDown?'#059669':'#94a3b8',fontWeight:600}}>
                    {prev?(isUp?'▲':'▼')+Math.abs(diff).toFixed(2):'-'}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App() {
  const [tab,setTab] = useState(0);
  const tabs = ['개요','PO별 수입원가','라이센스/워런티','외화송금내역','Usance L/C','환율'];
  const panels = [<Overview/>,<POTable/>,<LicTable/>,<RemitTable/>,<LCTable/>,<FXTable/>];
  return (
    <div>
      <div className="header">
        <div>
          <h1>🏭 RNR 수입원가 대시보드</h1>
          <div style={{fontSize:11,opacity:0.7,marginTop:2}}>PO별 개당 수입원가 현황</div>
        </div>
        <div className="meta">
          <div>기준일: {BASE_DATE}</div>
          <div>총 수입원가: ₩{fmt(GRAND_TOTAL)}</div>
          <div>최신환율: ₩{LATEST_RATE.toLocaleString()}</div>
        </div>
      </div>
      <div className="tabs">
        {tabs.map((t,i)=><div key={i} className={`tab${tab===i?' active':''}`} onClick={()=>setTab(i)}>{t}</div>)}
      </div>
      <div className="content">{panels[tab]}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
